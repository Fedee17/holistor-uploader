<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holistor — Subir Facturas</title>
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px; }
  .card { background: #fff; border: 0.5px solid #e0e0d8; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; font-size: 15px; font-weight: 500; }
  .card-header i { font-size: 18px; color: #888; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1rem; }
  .stat { background: #f5f5f0; border-radius: 8px; padding: 12px; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 500; }
  .drop-zone { border: 1.5px dashed #ccc; border-radius: 12px; padding: 2.5rem; text-align: center; cursor: pointer; transition: background 0.15s; }
  .drop-zone:hover, .drop-zone.dragover { background: #f5f5f0; }
  .drop-zone i { font-size: 32px; color: #aaa; display: block; margin-bottom: 8px; }
  .drop-zone p { color: #888; font-size: 14px; margin-top: 4px; }
  .drop-zone strong { color: #1a1a1a; }
  input[type=file] { display: none; }
  .queue { margin-top: 1rem; display: none; }
  .queue-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500; margin-bottom: 8px; }
  .file-list { max-height: 260px; overflow-y: auto; }
  .file-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: #fff; border: 0.5px solid #e8e8e0; border-radius: 8px; margin-bottom: 6px; }
  .file-name { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-size { font-size: 12px; color: #888; white-space: nowrap; }
  .badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 6px; white-space: nowrap; }
  .b-pending { background: #f0f0ea; color: #666; }
  .b-uploading { background: #e8f0fe; color: #1a73e8; }
  .b-done { background: #e6f4ea; color: #188038; }
  .b-error { background: #fce8e6; color: #c5221f; }
  .btn-remove { background: none; border: none; cursor: pointer; color: #aaa; font-size: 16px; padding: 2px; line-height: 1; }
  .btn-remove:hover { color: #c5221f; }
  .btn-row { display: flex; gap: 10px; margin-top: 1rem; flex-wrap: wrap; }
  .btn-primary { background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 9px 20px; font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { background: none; border: 0.5px solid #ccc; border-radius: 8px; padding: 9px 20px; font-size: 14px; cursor: pointer; color: #1a1a1a; }
  .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
  .progress-wrap { height: 3px; background: #e0e0d8; border-radius: 2px; margin-top: 8px; overflow: hidden; display: none; }
  .progress-bar { height: 100%; background: #1a73e8; border-radius: 2px; transition: width 0.2s; }
  .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 1rem; display: none; align-items: flex-start; gap: 8px; }
  .alert i { font-size: 16px; margin-top: 1px; flex-shrink: 0; }
  .a-success { background: #e6f4ea; color: #188038; border: 0.5px solid #a8d5b5; }
  .a-error { background: #fce8e6; color: #c5221f; border: 0.5px solid #f5b8b5; }
  .a-info { background: #e8f0fe; color: #1a73e8; border: 0.5px solid #aac4f5; }
  .history-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-bottom: 0.5px solid #e8e8e0; font-size: 13px; }
  .history-item:last-child { border-bottom: none; }
  .history-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .history-time { font-size: 12px; color: #888; white-space: nowrap; }
  .empty { text-align: center; padding: 2rem; color: #aaa; font-size: 13px; }
  .empty i { font-size: 28px; display: block; margin-bottom: 8px; }
  .btn-periodo { background: #f5f5f0; border: 0.5px solid #ccc; border-radius: 8px; padding: 7px 16px; font-size: 13px; cursor: pointer; color: #444; }
  .btn-periodo.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
</style>
</head>
<body>
<div class="container">
  <h1><i class="ti ti-file-invoice"></i> Holistor — Subir facturas</h1>

  <div id="alert" class="alert"></div>

  <div class="stats">
    <div class="stat"><div class="stat-label">En cola</div><div class="stat-value" id="statCola">0</div></div>
    <div class="stat"><div class="stat-label">Subidos</div><div class="stat-value" id="statSubidos">0</div></div>
    <div class="stat"><div class="stat-label">Errores</div><div class="stat-value" id="statErrores">0</div></div>
  </div>

  <div class="card">
    <div class="card-header"><i class="ti ti-cloud-upload"></i> Subir facturas</div>
    <div style="margin-bottom:1rem;">
      <label style="font-size:13px;font-weight:500;color:#444;display:block;margin-bottom:6px;">Período de carga</label>
      <div style="display:flex;gap:8px;">
        <button id="btnMesAnt" onclick="setPeriodo('anterior')" class="btn-periodo active">
          Mes anterior
        </button>
        <button id="btnMesAct" onclick="setPeriodo('actual')" class="btn-periodo">
          Mes actual
        </button>
      </div>
      <div id="periodoInfo" style="font-size:12px;color:#888;margin-top:6px;"></div>
    </div>
    <div class="drop-zone" id="dropZone">
      <i class="ti ti-file-upload"></i>
      <p><strong>Arrastrá los PDFs acá</strong> o hacé clic para seleccionarlos</p>
      <p>Solo archivos PDF · Múltiples archivos permitidos</p>
    </div>
    <input type="file" id="fileInput" accept=".pdf" multiple />

    <div class="queue" id="queue">
      <div class="queue-label" id="queueLabel">0 archivos</div>
      <div id="loteInfo" style="display:none; font-size:13px; color:#1a73e8; background:#e8f0fe; border-radius:8px; padding:8px 12px; margin-bottom:8px;">
        <i class="ti ti-stack-2" style="font-size:14px;"></i> <span id="loteInfoText"></span>
      </div>
      <div class="file-list" id="fileList"></div>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>
      <div id="loteResultado" style="display:none; font-size:13px; color:#188038; background:#e6f4ea; border-radius:8px; padding:8px 12px; margin-bottom:8px;">
        <i class="ti ti-circle-check" style="font-size:14px;"></i> <span id="loteResultadoText"></span>
      </div>
      <div class="btn-row">
        <button class="btn-primary" id="btnSubir" onclick="startUpload()">
          <i class="ti ti-upload"></i> Subir y procesar
        </button>
        <button class="btn-secondary" id="btnProcesar" onclick="sendFlush()" style="display:none;">
          <i class="ti ti-player-play"></i> Procesar ahora
        </button>
        <button class="btn-secondary" onclick="clearPending()">Limpiar pendientes</button>
      </div>
    </div>
  </div>

  <div class="card" id="cardFallidos" style="display:none; border-color:#f5b8b5;">
    <div class="card-header" style="color:#c5221f;"><i class="ti ti-alert-circle"></i> Facturas con error</div>
    <div id="listFallidos"></div>
    <div class="btn-row" style="margin-top:1rem;">
      <button class="btn-primary" style="background:#c5221f;" onclick="reintentar()">
        <i class="ti ti-refresh"></i> Reintentar fallidas
      </button>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><i class="ti ti-history"></i> Historial de esta sesión</div>
    <div id="historyList">
      <div class="empty"><i class="ti ti-inbox"></i>Todavía no se subieron archivos</div>
    </div>
  </div>
</div>

<script>
let periodo = 'anterior';
let archivosFallidos = [];

async function reintentar() {
  if (!archivosFallidos.length) return;
  showAlert(`Reintentando ${archivosFallidos.length} archivo${archivosFallidos.length!==1?'s':''}...`, 'info');
  // Buscar los archivos fallidos en la cola y resetearlos a pending
  archivosFallidos.forEach(nombre => {
    const idx = files.findIndex(f => f.name === nombre);
    if (idx !== -1) files[idx].status = 'pending';
  });
  archivosFallidos = [];
  document.getElementById('cardFallidos').style.display = 'none';
  renderQueue();
  await startUpload();
}

function mostrarFallidos(fallidos) {
  if (!fallidos || !fallidos.length) return;
  archivosFallidos = fallidos;
  document.getElementById('cardFallidos').style.display = 'block';
  document.getElementById('listFallidos').innerHTML = fallidos.map(nombre => `
    <div class="history-item">
      <i class="ti ti-file-type-pdf" style="font-size:15px;color:#c5221f;flex-shrink:0;"></i>
      <span class="history-name">${nombre}</span>
      <span class="badge b-error">error</span>
    </div>
  `).join('');
}

function setPeriodo(p) {
  periodo = p;
  document.getElementById('btnMesAnt').classList.toggle('active', p === 'anterior');
  document.getElementById('btnMesAct').classList.toggle('active', p === 'actual');
  const hoy = new Date();
  let mes, anio;
  if (p === 'anterior') {
    const ult = new Date(hoy.getFullYear(), hoy.getMonth(), 0);
    mes = ult.toLocaleString('es-AR', { month: 'long' });
    anio = ult.getFullYear();
  } else {
    mes = hoy.toLocaleString('es-AR', { month: 'long' });
    anio = hoy.getFullYear();
  }
  document.getElementById('periodoInfo').textContent = `Fecha de recepción: último día de ${mes} ${anio}`;
}

const WEBHOOK = 'https://fede123.app.n8n.cloud/webhook/holistor-upload';
const WEBHOOK_PROCESO   = 'https://fede123.app.n8n.cloud/webhook/holistor-procesar';
const WEBHOOK_VERIFICAR = 'https://fede123.app.n8n.cloud/webhook/holistor-verificar';
let files = [], history = [], uploading = false, subidos = 0, errores = 0;

function showAlert(msg, type) {
  const el = document.getElementById('alert');
  const icons = { success: 'circle-check', error: 'alert-circle', info: 'info-circle' };
  el.className = 'alert a-' + type;
  el.innerHTML = `<i class="ti ti-${icons[type]}"></i><span>${msg}</span>`;
  el.style.display = 'flex';
  if (type !== 'info') setTimeout(() => el.style.display = 'none', 5000);
}

function updateStats() {
  document.getElementById('statCola').textContent = files.filter(f => f.status === 'pending').length;
  document.getElementById('statSubidos').textContent = subidos;
  document.getElementById('statErrores').textContent = errores;
}

function renderQueue() {
  const q = document.getElementById('queue');
  if (!files.length) { q.style.display = 'none'; updateStats(); return; }
  q.style.display = 'block';
  const pending = files.filter(f => f.status === 'pending').length;
  document.getElementById('queueLabel').textContent = `${files.length} archivo${files.length !== 1 ? 's' : ''} — ${pending} pendiente${pending !== 1 ? 's' : ''}`;
  if (pending > 0) {
    const lotes = Math.ceil(pending / 50);
    document.getElementById('loteInfo').style.display = 'block';
    document.getElementById('loteInfoText').textContent = `Se van a generar ${lotes} lote${lotes !== 1 ? 's' : ''} de hasta 50 facturas cada uno`;
    document.getElementById('loteResultado').style.display = 'none';
  } else {
    document.getElementById('loteInfo').style.display = 'none';
  }
  const labels = { pending: 'pendiente', uploading: 'subiendo', done: 'listo', error: 'error' };
  document.getElementById('fileList').innerHTML = files.map((f, i) => `
    <div class="file-item">
      <i class="ti ti-file-type-pdf" style="font-size:16px;color:#c5221f;flex-shrink:0;"></i>
      <span class="file-name">${f.name}</span>
      <span class="file-size">${(f.size/1024).toFixed(0)} KB</span>
      <span class="badge b-${f.status}">${labels[f.status]}</span>
      ${f.status === 'pending' ? `<button class="btn-remove" onclick="removeFile(${i})" aria-label="Quitar"><i class="ti ti-x"></i></button>` : ''}
    </div>
  `).join('');
  updateStats();
}

function renderHistory() {
  const el = document.getElementById('historyList');
  if (!history.length) { el.innerHTML = '<div class="empty"><i class="ti ti-inbox"></i>Todavía no se subieron archivos</div>'; return; }
  el.innerHTML = history.map(h => `
    <div class="history-item">
      <i class="ti ti-file-type-pdf" style="font-size:15px;color:#c5221f;flex-shrink:0;"></i>
      <span class="history-name">${h.name}</span>
      <span class="history-time">${h.time}</span>
      <span class="badge ${h.ok ? 'b-done' : 'b-error'}">${h.ok ? 'subido' : 'error'}</span>
    </div>
  `).join('');
}

async function verificarDuplicado(nombre) {
  try {
    const res = await fetch(WEBHOOK_VERIFICAR, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre })
    });
    const data = await res.json();
    return data.existe === true;
  } catch(e) { return false; }
}

async function addFiles(newFiles) {
  const pdfs = Array.from(newFiles).filter(f => f.type === 'application/pdf' || f.name.endsWith('.pdf'));
  if (!pdfs.length) { showAlert('Solo se aceptan archivos PDF', 'error'); return; }

  const duplicados = [];
  for (const f of pdfs) {
    const existe = await verificarDuplicado(f.name);
    if (existe) {
      duplicados.push(f.name);
    } else {
      files.push({ name: f.name, size: f.size, file: f, status: 'pending' });
    }
  }

  if (duplicados.length > 0) {
    showAlert(`${duplicados.length} archivo${duplicados.length!==1?'s ya existían':'  ya existía'} en Drive y ${duplicados.length!==1?'fueron omitidos':'fue omitido'}: ${duplicados.join(', ')}`, 'error');
  }
  renderQueue();
}

function removeFile(i) { files.splice(i, 1); renderQueue(); }
function clearPending() { files = files.filter(f => f.status !== 'pending'); renderQueue(); }

async function startUpload() {
  if (uploading) return;
  const pending = files.filter(f => f.status === 'pending');
  if (!pending.length) return;
  uploading = true;
  document.getElementById('btnSubir').disabled = true;
  document.getElementById('progressWrap').style.display = 'block';
  let done = 0;
  const total = pending.length;

  for (let i = 0; i < files.length; i++) {
    if (files[i].status !== 'pending') continue;
    files[i].status = 'uploading';
    renderQueue();
    try {
      const fd = new FormData();
      fd.append('file', files[i].file, files[i].name);
      const res = await fetch(WEBHOOK, { method: 'POST', body: fd });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      files[i].status = 'done';
      subidos++;
      history.unshift({ name: files[i].name, time: new Date().toLocaleTimeString('es-AR'), ok: true });
    } catch(e) {
      files[i].status = 'error';
      errores++;
      history.unshift({ name: files[i].name, time: new Date().toLocaleTimeString('es-AR'), ok: false });
    }
    done++;
    document.getElementById('progressBar').style.width = Math.round(done / total * 100) + '%';
    renderQueue();
    renderHistory();
  }

  uploading = false;
  document.getElementById('btnSubir').disabled = false;

  const ok = files.filter(f => f.status === 'done').length;
  const err = files.filter(f => f.status === 'error').length;

  if (ok > 0) {
    try {
      const respProceso = await fetch(WEBHOOK_PROCESO, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ flush: true, periodo: periodo })
      });
      try {
        const dataProceso = await respProceso.json();
        if (dataProceso.fallidos && dataProceso.fallidos.length > 0) {
          mostrarFallidos(dataProceso.fallidos);
        }
      } catch(e) {}
      const lotesEjecutados = Math.ceil(ok / 50);
      document.getElementById('loteResultado').style.display = 'block';
      document.getElementById('loteResultadoText').textContent = `${ok} archivo${ok!==1?'s':''} subido${ok!==1?'s':''} — ${lotesEjecutados} lote${lotesEjecutados!==1?'s':''} en proceso`;
      document.getElementById('loteInfo').style.display = 'none';
      showAlert(`${ok} archivo${ok!==1?'s':''} subido${ok!==1?'s':''}${err ? ' · ' + err + ' con error' : ''}. n8n está procesando el lote.`, 'success');
    } catch(e) {
      showAlert(`${ok} archivo${ok!==1?'s':''} subido${ok!==1?'s':''}. No se pudo iniciar el proceso automático — usá el botón "Procesar ahora".`, 'error');
      document.getElementById('btnProcesar').style.display = 'inline-block';
    }
  } else {
    showAlert('No se pudo subir ningún archivo.', 'error');
  }
}

async function sendFlush() {
  try {
    document.getElementById('btnProcesar').disabled = true;
    await fetch(WEBHOOK_PROCESO, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ flush: true, periodo: periodo }) });
    showAlert('Señal enviada — n8n va a procesar el lote ahora', 'success');
  } catch(e) { showAlert('No se pudo enviar la señal', 'error'); }
  document.getElementById('btnProcesar').disabled = false;
}

setPeriodo('anterior');
const dz = document.getElementById('dropZone');
const fi = document.getElementById('fileInput');
dz.addEventListener('click', () => fi.click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); addFiles(e.dataTransfer.files); });
fi.addEventListener('change', e => { addFiles(e.target.files); fi.value = ''; });
</script>
</body>
</html>
